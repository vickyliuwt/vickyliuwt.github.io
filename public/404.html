<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lost pup — Weiting Liu 🐾</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Nunito', system-ui, sans-serif;
      color: #7c6154;
      display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 24px;
      background: linear-gradient(125deg, #fff7f4 0%, #fef0f0 24%, #fbf1f5 48%, #fefae7 70%, #f9e7e6 88%, #fbe4df 100%);
      background-size: 240% 240%;
      animation: bgFlow 26s ease infinite;
    }
    @keyframes bgFlow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    .card {
      background: rgba(255, 255, 255, 0.7);
      border: 1.5px solid rgba(255, 255, 255, 0.8);
      border-radius: 28px;
      padding: 44px 34px;
      max-width: 460px;
      box-shadow: 0 18px 40px rgba(150, 90, 105, 0.18);
      backdrop-filter: blur(6px);
    }
    .paw { font-size: 66px; animation: bounce 2.4s ease-in-out infinite; }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
    h1 { font-family: 'Baloo 2', sans-serif; color: #b34a6b; font-size: 30px; margin: 10px 0 6px; }
    .code { font-family: 'Baloo 2', sans-serif; color: #ec88a3; font-size: 15px; letter-spacing: 2px; font-weight: 700; }
    p { font-size: 16px; line-height: 1.6; margin: 12px 0 22px; }
    a.home {
      display: inline-block; text-decoration: none;
      font-family: 'Baloo 2', sans-serif; font-weight: 700; font-size: 16px;
      color: #fff; background: linear-gradient(135deg, #f2aebc, #ec88a3);
      padding: 13px 26px; border-radius: 999px;
      box-shadow: 0 10px 24px rgba(150, 90, 105, 0.22);
      transition: transform .15s;
    }
    a.home:hover { transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="card">
    <div class="paw" aria-hidden="true">🐾</div>
    <div class="code">ERROR 404</div>
    <h1>This pup wandered off!</h1>
    <p>The page you were looking for isn't here. Let's head back to somewhere friendly.</p>
    <!-- Root works for a user site (username.github.io). If you deploy under a
         project sub-path, change "/" below to "/your-repo-name/". -->
    <a class="home" href="/">🏠 Back to home</a>
  </div>
</body>
</html>
